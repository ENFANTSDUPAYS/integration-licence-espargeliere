<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TalkNotes</title>
    <link rel="stylesheet" href="main.css">
    <link rel="icon" href="assets/ico/image.png" type="image/x-icon">
</head>
<body class="bg-white">

    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Logo Centré -->
            <div class="login-logo">
                <a href="index.html">
                    <img src="assets/ico/logo.svg" alt="TalkNotes Logo" width="150">
                </a>
            </div>

            <!-- Textes -->
            <h1 class="login-title">Login to your account</h1>
            <p class="login-subtitle">Enter your email to receive a one-time password (or use permanent password if you defined one).</p>

            <!-- Formulaire -->
            <form class="login-form">
                <div class="form-group">
                    <label for="email">Email address:</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <!-- Boutons d'action -->
                <button type="submit" class="btn-auth btn-auth--otp">
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" class="icon" width="1.3em" height="1.3em" viewBox="0 0 16 16" style="vertical-align: -0.125em;">
                        <g fill="currentColor">
                            <path d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793q.039.014.076.032L7.674 8.51c.206.1.446.1.652 0l6.598-3.185l.076-.032V4.5A1.5 1.5 0 0 0 13.5 3z"></path>
                            <path d="M15 6.954L8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5z"></path>
                        </g>
                    </svg>
                    Get one-time password
                </button>
                
                <button type="button" class="btn-auth btn-auth--pwd">
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" class="icon" width="1.3em" height="1.3em" viewBox="0 0 20 20" style="vertical-align: -0.125em;">
                        <path fill="currentColor" fill-rule="evenodd" d="M10 2.5c-1.31 0-2.526.386-3.546 1.051a.75.75 0 0 1-.82-1.256A8 8 0 0 1 18 9a22.5 22.5 0 0 1-1.228 7.351a.75.75 0 1 1-1.417-.49A21 21 0 0 0 16.5 9A6.5 6.5 0 0 0 10 2.5M4.333 4.416a.75.75 0 0 1 .218 1.038A6.47 6.47 0 0 0 3.5 9a7.97 7.97 0 0 1-1.293 4.362a.75.75 0 0 1-1.257-.819A6.47 6.47 0 0 0 2 9c0-1.61.476-3.11 1.295-4.365a.75.75 0 0 1 1.038-.219M10 6.12a3 3 0 0 0-3.001 3.041a11.46 11.46 0 0 1-2.697 7.24a.75.75 0 0 1-1.148-.965A9.96 9.96 0 0 0 5.5 9q0-.042.004-.082a4.5 4.5 0 0 1 8.996.084v.148l-.005.297a.75.75 0 1 1-1.5-.034Q13 9.248 13 9.085a3 3 0 0 0-3-2.965m0 2.13a.75.75 0 0 1 .75.75c0 3.51-1.187 6.746-3.181 9.323a.75.75 0 1 1-1.186-.918A13.7 13.7 0 0 0 9.25 9a.75.75 0 0 1 .75-.75m3.529 3.698a.75.75 0 0 1 .584.885a18.9 18.9 0 0 1-2.257 5.84a.75.75 0 1 1-1.29-.764a17.4 17.4 0 0 0 2.078-5.377a.75.75 0 0 1 .885-.584" clip-rule="evenodd"></path>
                    </svg>
                    Login with password
                </button>
            </form>

            <p class="login-help">Problems logging in? <a href="#">Click here</a></p>

            <div class="login-divider">
                <span>Or continue with</span>
            </div>

            <!-- Boutons Sociaux -->
            <div class="login-socials">
                <button class="btn-auth btn-auth--social">
                    <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="icon" width="1em" height="1em" viewBox="0 0 48 48" style="vertical-align: -0.125em;">
                        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917"></path>
                        <path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691"></path>
                        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.9 11.9 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44"></path>
                        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917"></path>
                    </svg>
                    Continue with Google
                </button>
                <button class="btn-auth btn-auth--social">
                    <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="icon" width="1em" height="1em" viewBox="0 0 24 24" style="vertical-align: -0.125em;">
                        <path fill="currentColor" d="M11.703 5.616c.03-.905.278-2.237 1.145-3.112c.805-.813 1.785-1.209 2.395-1.39a.347.347 0 0 1 .45.353c-.04.866-.268 2.158-.856 2.85c-.554.652-1.444 1.516-2.749 1.662a.348.348 0 0 1-.385-.363"></path>
                        <path fill="currentColor" d="M13.937 22.17c.627.24 1.26.482 1.833.482c1.227 0 4.798-2.83 4.926-5.768a.4.4 0 0 0-.215-.36c-.908-.508-2.392-1.774-2.443-3.615c-.06-2.146 1.017-3.85 1.832-4.555c.184-.159.247-.439.083-.617c-.742-.81-2.234-1.925-3.596-1.898c-.99.02-1.883.39-2.65.706c-.587.243-1.1.455-1.526.455c-.403 0-.887-.21-1.443-.453c-.748-.326-1.626-.708-2.61-.708c-1.824 0-5.428 1.513-5.428 7.352c0 3.095 3.195 9.543 5.892 9.461c.582 0 1.204-.24 1.822-.48c.608-.236 1.211-.47 1.767-.47c.537 0 1.143.233 1.756.468"></path>
                    </svg>
                    Continue with Apple
                </button>
            </div>

        </div>
    </div>

    <!-- Bouton flottant Chat -->
    <button class="floating-chat" aria-label="Chat support">
        <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="24" height="24" viewBox="0 0 20 20">
            <path fill="currentColor" d="M8.5 2a6.5 6.5 0 0 0-5.675 9.672l-.795 2.082a1 1 0 0 0 1.204 1.32l2.487-.697A6.5 6.5 0 1 0 8.5 2m-.007 3.901c-.358.07-.75.302-1.058.846a.5.5 0 1 1-.87-.494c.441-.776 1.068-1.203 1.736-1.333a2.43 2.43 0 0 1 1.792.361c.484.32.875.843.887 1.47c.013.655-.385 1.246-1.119 1.68c-.498.294-.692.494-.775.627C9.016 9.17 9 9.272 9 9.5a.5.5 0 0 1-1 0c0-.272.014-.61.237-.97c.21-.337.569-.637 1.115-.96c.535-.317.632-.618.629-.798c-.005-.207-.142-.46-.44-.657a1.43 1.43 0 0 0-1.048-.214M8.75 12.5a.75.75 0 1 1 0-1.5a.75.75 0 0 1 0 1.5m-2.214 3.24A6.49 6.49 0 0 0 11.463 18c.993 0 1.936-.223 2.78-.623l2.487.697a1 1 0 0 0 1.203-1.32l-.796-2.082a6.5 6.5 0 0 0 .826-3.172c0-1.94-.85-3.682-2.199-4.873c.146.564.227 1.155.235 1.762c.608.885.964 1.957.964 3.111c0 1.05-.294 2.031-.805 2.866l-.128.21l.97 2.535l-2.86-.8l-.175.088c-.75.384-1.6.601-2.502.601a5.5 5.5 0 0 1-3.167-1.003a7.5 7.5 0 0 1-1.76-.257"></path>
        </svg>
    </button>

</body>
</html>
